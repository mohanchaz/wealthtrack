<!-- Foreign Stocks Actual Invested Modal -->
<div id="foreign-invested-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width:420px">
        <div class="modal-header">
            <h2 id="foreign-invested-modal-title">Add Entry</h2>
            <button class="modal-close-btn" id="foreign-invested-close-btn">&times;</button>
        </div>
        <div class="modal-body" style="display:grid;gap:16px;padding:24px">

            <div class="form-group full-width">
                <label class="form-label" for="fai-date">Date</label>
                <input class="modal-input" id="fai-date" type="date" />
            </div>

            <div class="form-group full-width">
                <label class="form-label" for="fai-gbp">Amount Invested (£ GBP)</label>
                <input class="modal-input" id="fai-gbp" type="number" min="0" step="0.01" placeholder="e.g. 500.00" />
            </div>

            <div class="form-group full-width">
                <label class="form-label" for="fai-inr-rate">GBP → INR Rate on that day</label>
                <input class="modal-input" id="fai-inr-rate" type="number" min="0" step="0.01"
                    placeholder="e.g. 107.50" />
                <div style="font-size:11px;color:var(--muted2);margin-top:4px">INR Amount = GBP × Rate</div>
            </div>

            <!-- Live preview -->
            <div id="fai-inr-preview"
                style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;display:none">
                <span style="color:var(--muted2)">INR equivalent:</span>
                <span id="fai-inr-preview-val" style="font-weight:700;color:var(--accent);margin-left:6px">—</span>
            </div>

        </div>
        <div class="modal-footer">
            <button class="modal-cancel-btn" id="foreign-invested-cancel-btn">Cancel</button>
            <button class="modal-save-btn" id="foreign-invested-save-btn">💾 Save Entry</button>
        </div>
    </div>
</div>
