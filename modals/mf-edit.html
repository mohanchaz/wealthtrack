  <!-- Mutual Fund Edit Modal -->
  <div id="mf-edit-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width:440px">
      <div class="modal-header">
        <h3 id="mf-edit-modal-title">Edit Fund</h3>
        <button class="modal-close" id="mf-edit-close-btn" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="asset-form-grid">

          <div class="asset-form-group-title">Fund</div>

          <div class="form-group full-width">
            <label class="form-label" for="mfe-name">Fund Name</label>
            <input class="modal-input" id="mfe-name" type="text"
              style="background:var(--surface2);color:var(--muted);cursor:not-allowed" readonly />
          </div>

          <div class="asset-form-group-title">Holdings</div>

          <div class="form-group">
            <label class="form-label" for="mfe-qty">Units</label>
            <input class="modal-input" id="mfe-qty" type="number" min="0" step="0.001" placeholder="e.g. 169.09" />
          </div>

          <div class="form-group">
            <label class="form-label" for="mfe-avg-cost">Avg NAV (₹)</label>
            <input class="modal-input" id="mfe-avg-cost" type="number" min="0" step="0.01" placeholder="e.g. 112.65" />
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <div style="font-size:12px;color:var(--muted);margin-right:auto">NAV updates automatically on Refresh</div>
        <button class="btn-secondary" id="mf-edit-cancel-btn">Cancel</button>
        <button class="btn-primary" id="mf-edit-save-btn">💾 Save Changes</button>
      </div>
    </div>
  </div>
