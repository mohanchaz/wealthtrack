  <!-- Mutual Fund CSV Import Modal -->
  <div id="mf-import-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width:680px">
      <div class="modal-header">
        <h2>Import Mutual Funds</h2>
        <button class="modal-close-btn" id="mf-import-close-btn">&times;</button>
      </div>
      <div class="modal-body" style="padding:24px;display:flex;flex-direction:column;gap:20px">

        <!-- File picker -->
        <div style="border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center">
          <div style="font-size:28px;margin-bottom:8px">📂</div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px">Select your Zerodha Holdings CSV</div>
          <div style="font-size:12px;color:var(--muted2);margin-bottom:14px">Download from Zerodha Console → Portfolio → Holdings → Download</div>
          <input type="file" id="mf-csv-input" accept=".csv" style="display:none">
          <button onclick="document.getElementById('mf-csv-input').click()"
            style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer">Choose File</button>
          <div id="mf-csv-filename" style="margin-top:8px;font-size:12px;color:var(--muted2)"></div>
        </div>

        <!-- Preview -->
        <div id="mf-preview-section" class="hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="font-size:14px;font-weight:600;color:var(--text)">Mutual Funds detected <span id="mf-fund-count"
                style="background:var(--accentbg);color:var(--accent);padding:2px 10px;border-radius:20px;font-size:12px;margin-left:6px">0</span>
            </div>
            <div style="font-size:11px;color:var(--muted2)">Stocks and Gold funds excluded automatically</div>
          </div>
          <div style="max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead id="mf-preview-thead"></thead>
              <tbody id="mf-preview-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-cancel-btn" id="mf-import-cancel-btn">Cancel</button>
        <button class="modal-save-btn hidden" id="mf-import-confirm-btn">📥 Import <span id="mf-import-count">0</span> Funds</button>
      </div>
    </div>
  </div>
