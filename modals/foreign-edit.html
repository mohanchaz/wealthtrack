<!-- Foreign Stock Edit Modal -->
  <div id="foreign-edit-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width:420px">
      <div class="modal-header">
        <h2 id="foreign-edit-title">Edit Holding</h2>
        <button class="modal-close-btn" id="foreign-edit-close-btn">&times;</button>
      </div>
      <div class="modal-body" style="padding:24px;display:flex;flex-direction:column;gap:16px">

        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:12px;font-weight:600;color:var(--muted2)">Symbol</label>
          <input id="foreign-edit-symbol" type="text" placeholder="e.g. AAPL"
            style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;text-transform:uppercase">
        </div>

        <div style="display:flex;gap:12px">
          <div style="flex:1;display:flex;flex-direction:column;gap:6px">
            <label style="font-size:12px;font-weight:600;color:var(--muted2)">Quantity</label>
            <input id="foreign-edit-qty" type="number" step="0.00001" min="0" placeholder="e.g. 3.4271"
              style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit">
          </div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px">
            <label style="font-size:12px;font-weight:600;color:var(--muted2)">Avg Price <span style="font-weight:400">(native)</span></label>
            <input id="foreign-edit-price" type="number" step="0.01" min="0" placeholder="e.g. 214.64"
              style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit">
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:12px;font-weight:600;color:var(--muted2)">Currency</label>
          <select id="foreign-edit-currency"
            style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff">
            <option value="USD">USD — US Dollar</option>
            <option value="GBX">GBX — British Pence (÷ 100 for GBP display)</option>
          </select>
        </div>

        <div style="font-size:11.5px;color:var(--muted2);background:var(--surface2);border-radius:8px;padding:10px 12px;line-height:1.6">
          💡 Unit price &amp; current value come from the CSV import and are not stored — re-import to refresh them.
        </div>

      </div>
      <div class="modal-footer">
        <button class="modal-cancel-btn" id="foreign-edit-cancel-btn">Cancel</button>
        <button class="modal-save-btn" id="foreign-edit-save-btn">💾 Save</button>
      </div>
    </div>
  </div>
