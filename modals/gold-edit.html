  <!-- Gold Edit Modal -->
  <div id="gold-edit-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width:440px">
      <div class="modal-header">
        <h3 id="gold-edit-modal-title">Edit Gold Holding</h3>
        <button class="modal-close" id="gold-edit-close-btn" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="asset-form-grid">

          <div class="asset-form-group-title">Holding</div>

          <div class="form-group full-width">
            <label class="form-label" for="ge-name">Name / Symbol</label>
            <input class="modal-input" id="ge-name" type="text"
              style="background:var(--surface2);color:var(--muted);cursor:not-allowed" readonly />
          </div>

          <div class="form-group full-width">
            <label class="form-label" for="ge-type">Type</label>
            <input class="modal-input" id="ge-type" type="text"
              style="background:var(--surface2);color:var(--muted);cursor:not-allowed" readonly />
          </div>

          <div class="asset-form-group-title">Holdings</div>

          <div class="form-group">
            <label class="form-label" for="ge-qty">Qty / Units</label>
            <input class="modal-input" id="ge-qty" type="number" min="0" step="0.001" placeholder="e.g. 10" />
          </div>

          <div class="form-group">
            <label class="form-label" for="ge-avg-cost">Avg Cost / NAV (₹)</label>
            <input class="modal-input" id="ge-avg-cost" type="number" min="0" step="0.01" placeholder="e.g. 62.85" />
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <div style="font-size:12px;color:var(--muted);margin-right:auto">Prices update automatically on Refresh</div>
        <button class="btn-secondary" id="gold-edit-cancel-btn">Cancel</button>
        <button class="btn-primary" id="gold-edit-save-btn">💾 Save Changes</button>
      </div>
    </div>
  </div>
