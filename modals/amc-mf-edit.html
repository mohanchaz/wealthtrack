<!-- AMC MF Edit / Add Modal -->
  <div id="amc-mf-edit-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width:440px">
      <div class="modal-header">
        <h3 id="amc-mf-edit-modal-title">Add Fund</h3>
        <button class="modal-close" id="amc-mf-edit-close-btn" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="asset-form-grid">

          <div class="asset-form-group-title">Fund</div>

          <div class="form-group full-width">
            <label class="form-label" for="amcmf-name">Fund Name</label>
            <input class="modal-input" id="amcmf-name" type="text"
              style="background:var(--surface2);color:var(--muted);cursor:not-allowed"
              readonly placeholder="Fetched automatically from ticker" />
          </div>

          <div class="form-group">
            <label class="form-label" for="amcmf-platform">Platform</label>
            <input class="modal-input" id="amcmf-platform" type="text" placeholder="e.g. Groww, CAMS" />
          </div>

          <div class="form-group">
            <label class="form-label" for="amcmf-folio">Folio Number</label>
            <input class="modal-input" id="amcmf-folio" type="text" style="font-family:monospace" placeholder="e.g. 1234567890" />
          </div>

          <div class="form-group">
            <label class="form-label" for="amcmf-symbol">Yahoo Ticker</label>
            <input class="modal-input" id="amcmf-symbol" type="text"
              style="font-family:monospace" placeholder="e.g. 0P0001BN7D.BO" />
          </div>

          <div class="asset-form-group-title">Holdings</div>

          <div class="form-group">
            <label class="form-label" for="amcmf-qty">Units</label>
            <input class="modal-input" id="amcmf-qty" type="number" min="0" step="0.001" placeholder="e.g. 169.09" />
          </div>

          <div class="form-group">
            <label class="form-label" for="amcmf-avg-cost">Avg NAV (₹)</label>
            <input class="modal-input" id="amcmf-avg-cost" type="number" min="0" step="0.01" placeholder="e.g. 112.65" />
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <div style="font-size:12px;color:var(--muted);margin-right:auto">Fund name fetched from Yahoo on load</div>
        <button class="btn-secondary" id="amc-mf-edit-cancel-btn">Cancel</button>
        <button class="btn-primary" id="amc-mf-edit-save-btn">💾 Save</button>
      </div>
    </div>
  </div>
