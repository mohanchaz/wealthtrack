<!-- Crypto Edit Modal -->
<div id="crypto-edit-modal" class="modal-overlay hidden">
  <div class="modal-card" style="max-width:420px">
    <div class="modal-header">
      <h2 id="crypto-edit-title">Edit Holding</h2>
      <button class="modal-close-btn" id="crypto-edit-close-btn">&times;</button>
    </div>
    <div class="modal-body" style="padding:24px;display:flex;flex-direction:column;gap:16px">

      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:12px;font-weight:600;color:var(--muted2)">Yahoo Symbol</label>
        <input id="crypto-edit-symbol" type="text" placeholder="e.g. BTC-GBP"
          style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;text-transform:uppercase">
      </div>

      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:12px;font-weight:600;color:var(--muted2)">Platform</label>
        <select id="crypto-edit-platform"
          style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff">
          <option value="Platform 1">Platform 1</option>
          <option value="Platform 2">Platform 2</option>
        </select>
      </div>

      <div style="display:flex;gap:12px">
        <div style="flex:1;display:flex;flex-direction:column;gap:6px">
          <label style="font-size:12px;font-weight:600;color:var(--muted2)">Quantity</label>
          <input id="crypto-edit-qty" type="number" step="0.00000001" min="0"
            style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit">
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:6px">
          <label style="font-size:12px;font-weight:600;color:var(--muted2)">Avg Buy Price (£)</label>
          <input id="crypto-edit-avg-price" type="number" step="0.01" min="0"
            style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit">
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="modal-cancel-btn" id="crypto-edit-cancel-btn">Cancel</button>
      <button class="modal-save-btn" id="crypto-edit-save-btn">💾 Save</button>
    </div>
  </div>
</div>
