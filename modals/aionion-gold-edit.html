  <!-- Aionion Gold Edit Modal -->
  <div id="aionion-gold-edit-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width:440px">
      <div class="modal-header">
        <h3 id="aionion-gold-edit-modal-title">Add Gold ETF</h3>
        <button class="modal-close" id="aionion-gold-edit-close-btn" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="asset-form-grid">

          <div class="asset-form-group-title">Instrument</div>

          <div class="form-group full-width">
            <label class="form-label" for="age-instrument">Symbol (e.g. GOLDBEES)</label>
            <input class="modal-input" id="age-instrument" type="text" placeholder="e.g. GOLDBEES" />
          </div>

          <div class="asset-form-group-title">Holdings</div>

          <div class="form-group">
            <label class="form-label" for="age-qty">Quantity</label>
            <input class="modal-input" id="age-qty" type="number" min="0" step="0.001" placeholder="e.g. 10" />
          </div>

          <div class="form-group">
            <label class="form-label" for="age-avg-cost">Avg Cost (₹)</label>
            <input class="modal-input" id="age-avg-cost" type="number" min="0" step="0.01" placeholder="e.g. 62.85" />
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="aionion-gold-edit-cancel-btn">Cancel</button>
        <button class="btn-primary" id="aionion-gold-edit-save-btn">💾 Save</button>
      </div>
    </div>
  </div>
