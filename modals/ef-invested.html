  <!-- EF Actual Invested Modal -->
  <div id="ef-invested-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width:400px">
      <div class="modal-header">
        <h2 id="ef-invested-modal-title">Add Entry</h2>
        <button class="modal-close-btn" id="ef-invested-close-btn">&times;</button>
      </div>
      <div class="modal-body" style="display:grid;gap:16px;padding:24px">
        <div class="form-group full-width">
          <label class="form-label" for="efi-date">Date</label>
          <input class="modal-input" id="efi-date" type="date" />
        </div>
        <div class="form-group full-width">
          <label class="form-label" for="efi-amount">Amount Invested (₹)</label>
          <input class="modal-input" id="efi-amount" type="number" min="0" step="0.01" placeholder="e.g. 75000" />
        </div>
      <div class="modal-footer">
        <button class="modal-cancel-btn" id="ef-invested-cancel-btn">Cancel</button>
        <button class="modal-save-btn" id="ef-invested-save-btn">💾 Save Entry</button>
      </div>
    </div>
  </div>
