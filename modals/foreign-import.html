<!-- Foreign Stocks CSV Import Modal -->
  <div id="foreign-import-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width:720px">
      <div class="modal-header">
        <h2>Import Foreign Holdings</h2>
        <button class="modal-close-btn" id="foreign-import-close-btn">&times;</button>
      </div>
      <div class="modal-body" style="padding:24px;display:flex;flex-direction:column;gap:20px">

        <!-- File picker -->
        <div style="border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center">
          <div style="font-size:28px;margin-bottom:8px">🌍</div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px">Select your Foreign Holdings CSV</div>
          <div style="font-size:12px;color:var(--muted2);margin-bottom:14px">
            Expected columns: <code>symbol, quantity, avg_price, total_value</code><br>
            MKS is treated as <b>GBX</b> (pence) — all others as <b>USD</b>
          </div>
          <input type="file" id="foreign-csv-input" accept=".csv" style="display:none">
          <button onclick="document.getElementById('foreign-csv-input').click()"
            style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer">Choose File</button>
          <div id="foreign-csv-filename" style="margin-top:8px;font-size:12px;color:var(--muted2)"></div>
        </div>

        <!-- Preview -->
        <div id="foreign-preview-section" class="hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="font-size:14px;font-weight:600;color:var(--text)">
              Holdings detected
              <span id="foreign-stock-count" style="background:var(--accentbg);color:var(--accent);padding:2px 10px;border-radius:20px;font-size:12px;margin-left:6px">0</span>
            </div>
            <div style="font-size:11px;color:var(--muted2)">MKS → GBX &nbsp;·&nbsp; All others → USD</div>
          </div>
          <div style="max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead>
                <tr style="background:var(--surface2);position:sticky;top:0">
                  <th style="padding:8px 14px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)">Symbol</th>
                  <th style="padding:8px 14px;text-align:right;font-weight:600;border-bottom:1px solid var(--border)">Quantity</th>
                  <th style="padding:8px 14px;text-align:right;font-weight:600;border-bottom:1px solid var(--border)">Avg Price</th>
                  <th style="padding:8px 14px;text-align:right;font-weight:600;border-bottom:1px solid var(--border)">Unit Price</th>
                  <th style="padding:8px 14px;text-align:right;font-weight:600;border-bottom:1px solid var(--border)">Current Value</th>
                  <th style="padding:8px 14px;text-align:center;font-weight:600;border-bottom:1px solid var(--border)">Currency</th>
                </tr>
              </thead>
              <tbody id="foreign-preview-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-cancel-btn" id="foreign-import-cancel-btn">Cancel</button>
        <button class="modal-save-btn hidden" id="foreign-import-confirm-btn">📥 Import <span id="foreign-import-count">0</span> Holdings</button>
      </div>
    </div>
  </div>
