<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Cloud: 3 overlapping soft white circles -->
  <circle cx="160" cy="310" r="105" fill="rgba(255,255,255,0.15)"/>
  <circle cx="248" cy="225" r="128" fill="rgba(255,255,255,0.15)"/>
  <circle cx="352" cy="275" r="108" fill="rgba(255,255,255,0.15)"/>
  <!-- flat base -->
  <rect x="55" y="310" width="400" height="150" fill="rgba(255,255,255,0.15)"/>
  <!-- C in mint -->
  <text x="132" y="418" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="178" fill="#99F6E4">C</text>
  <!-- Green dot top-right -->
  <circle cx="434" cy="88" r="46" fill="#2ECC71"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D4F4A"/>
      <stop offset="60%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#1AA898"/>
    </linearGradient>
  </defs>
</svg>
