<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo { font-size: 32px; margin-bottom: 8px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #888; font-size: 14px; margin-bottom: 32px; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 24px;
      background: white;
      color: #1a1a24;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-google:hover { opacity: 0.9; }
    .btn-google img { width: 20px; height: 20px; }
    .status { margin-top: 16px; font-size: 13px; color: #888; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💰</div>
    <h1>Finance Tracker</h1>
    <p>Sign in to manage your ideal allocations and financial goals</p>
    <button class="btn-google" id="google-btn">
      <img src="https://www.google.com/favicon.ico" alt="Google" />
      Continue with Google
    </button>
    <div class="status" id="status"></div>
  </div>

  <script type="module">
  import { supabase } from './supabase.js'

  async function init() {
    const { data: { session } } = await supabase.auth.getSession()
    if (session) {
      window.location.href = '/app.html'
    }
  }

  init()

  document.getElementById('google-btn').addEventListener('click', async () => {
    const status = document.getElementById('status')
    status.textContent = 'Redirecting to Google...'
    status.className = 'status'

    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/app.html'
      }
    })

    if (error) {
      status.textContent = error.message
      status.className = 'status error'
    }
  })
</script>
</body>
</html>
