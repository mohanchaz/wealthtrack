<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker — Ideal Allocation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0f0f13; color: #e8e8f0; min-height: 100vh; }

    /* NAV */
    nav {
      background: #1a1a24;
      border-bottom: 1px solid #2a2a38;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav .logo { font-size: 18px; font-weight: 700; }
    nav .user { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #aaa; }
    nav .user img { width: 32px; height: 32px; border-radius: 50%; }
    nav button {
      background: none;
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    nav button:hover { border-color: #555; color: #fff; }

    /* MAIN */
    main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }

    /* INCOME */
    .income-card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .income-card label { font-size: 14px; color: #aaa; white-space: nowrap; }
    .income-card input {
      background: #0f0f13;
      border: 1px solid #2a2a38;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: 700;
      width: 220px;
    }
    .income-card input:focus { outline: none; border-color: #6366f1; }

    /* PROGRESS BAR */
    .bar-wrap {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 32px;
    }
    .bar-labels { display: flex; justify-content: space-between; font-size: 13px; color: #aaa; margin-bottom: 10px; }
    .bar-labels strong { color: #e8e8f0; }
    .bar { height: 12px; background: #0f0f13; border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 6px; transition: width 0.3s; }
    .bar-fill.over { background: linear-gradient(90deg, #ef4444, #f97316); }

    /* TABLE HEADER */
    .table-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr 44px;
      gap: 12px;
      padding: 0 16px 10px;
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ROW */
    .row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr 44px;
      gap: 12px;
      align-items: center;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .row:hover { border-color: #3a3a4a; }
    .row input[type="text"],
    .row input[type="number"] {
      background: #0f0f13;
      border: 1px solid #2a2a38;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s;
    }
    .row input:focus { outline: none; border-color: #6366f1; }
    .amount-display { font-size: 15px; font-weight: 600; color: #a5b4fc; }
    .btn-del {
      background: none;
      border: 1px solid #2a2a38;
      color: #555;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-del:hover { border-color: #ef4444; color: #ef4444; background: #1f0f0f; }

    /* ACTIONS */
    .actions { display: flex; gap: 12px; margin-top: 20px; align-items: center; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-add { background: #1a1a24; border: 1px solid #2a2a38; color: #aaa; }
    .btn-add:hover { border-color: #6366f1; color: #a5b4fc; }
    .btn-save { background: #6366f1; color: white; }
    .btn-save:hover { background: #5253cc; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .saved-msg { color: #22c55e; font-size: 13px; display: none; }
    .error-msg { color: #ef4444; font-size: 13px; display: none; }

    /* LOADING */
    .loading { text-align: center; padding: 80px; color: #555; font-size: 15px; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">💰 Finance Tracker</div>
    <div class="user">
      <img id="avatar" src="" alt="" style="display:none" />
      <span id="username">Loading...</span>
      <button id="signout-btn">Sign out</button>
    </div>
  </nav>

  <main>
    <h2>Ideal Allocation</h2>
    <p class="subtitle">Define how you want to allocate your monthly income across categories</p>

    <div id="app-content" class="loading">Loading your data...</div>
  </main>

  <script type="module">
    import { supabase } from './supabase.js'

    let user = null
    let rows = []

    const DEFAULT_CATEGORIES = [
      { category: 'Housing',          allocated_percent: 30, notes: 'Rent / Mortgage' },
      { category: 'Food & Groceries', allocated_percent: 15, notes: '' },
      { category: 'Transport',        allocated_percent: 10, notes: '' },
      { category: 'Savings',          allocated_percent: 20, notes: 'Emergency fund + investments' },
      { category: 'Entertainment',    allocated_percent: 10, notes: '' },
      { category: 'Healthcare',       allocated_percent: 5,  notes: '' },
      { category: 'Miscellaneous',    allocated_percent: 10, notes: '' },
    ]

    // ─── AUTH CHECK ───────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await supabase.auth.getSession()

      if (!session) {
        window.location.href = '/'
        return
      }

      user = session.user

      // Set nav user info
      const avatar = document.getElementById('avatar')
      if (user.user_metadata?.avatar_url) {
        avatar.src = user.user_metadata.avatar_url
        avatar.style.display = 'block'
      }
      document.getElementById('username').textContent =
        user.user_metadata?.full_name || user.email

      document.getElementById('signout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut()
        window.location.href = '/'
      })

      await loadData()
    }

    // ─── LOAD DATA ────────────────────────────────────────────────
    async function loadData() {
      const { data, error } = await supabase
        .from('ideal_allocations')
        .select('*')
        .eq('user_id', user.id)
        .order('created_at', { ascending: true })

      if (error) {
        document.getElementById('app-content').innerHTML =
          `<p style="color:#ef4444">Error loading data: ${error.message}</p>`
        return
      }

      rows = data && data.length > 0
        ? data
        : DEFAULT_CATEGORIES.map(r => ({ ...r, user_id: user.id }))

      const savedIncome = localStorage.getItem(`income_${user.id}`) || ''
      renderApp(savedIncome)
    }

    // ─── RENDER FULL APP ──────────────────────────────────────────
    function renderApp(savedIncome) {
      document.getElementById('app-content').innerHTML = `
        <div class="income-card">
          <label>Monthly Income (£)</label>
          <input type="number" id="income" placeholder="5000" value="${savedIncome}" />
        </div>

        <div class="bar-wrap">
          <div class="bar-labels">
            <span>Allocated: <strong id="allocated-pct">0%</strong></span>
            <span id="remaining-label">Remaining: 100%</span>
          </div>
          <div class="bar">
            <div class="bar-fill" id="bar-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="table-header">
          <div>Category</div>
          <div>% of Income</div>
          <div>Amount (£)</div>
          <div>Notes</div>
          <div></div>
        </div>

        <div id="rows-container"></div>

        <div class="actions">
          <button class="btn btn-add" id="add-btn">+ Add Category</button>
          <button class="btn btn-save" id="save-btn">Save Allocations</button>
          <span class="saved-msg" id="saved-msg">✓ Saved successfully!</span>
          <span class="error-msg" id="error-msg"></span>
        </div>
      `

      // Wire up events
      document.getElementById('income').addEventListener('input', onIncomeChange)
      document.getElementById('add-btn').addEventListener('click', addRow)
      document.getElementById('save-btn').addEventListener('click', save)

      renderRows()
      recalculate()
    }

    // ─── RENDER ROWS ──────────────────────────────────────────────
    function renderRows() {
      const container = document.getElementById('rows-container')
      container.innerHTML = ''
      const income = parseFloat(document.getElementById('income').value) || 0

      rows.forEach((row, i) => {
        const amount = income * (row.allocated_percent / 100)
        const div = document.createElement('div')
        div.className = 'row'
        div.dataset.index = i
        div.innerHTML = `
          <input type="text"
            value="${escapeHtml(row.category)}"
            placeholder="Category name"
            data-field="category"
            data-index="${i}" />
          <input type="number"
            value="${row.allocated_percent}"
            min="0" max="100" step="0.1"
            data-field="percent"
            data-index="${i}" />
          <div class="amount-display" id="amount-${i}">
            ${income ? '£' + formatNum(amount) : '—'}
          </div>
          <input type="text"
            value="${escapeHtml(row.notes || '')}"
            placeholder="Notes..."
            data-field="notes"
            data-index="${i}" />
          <button class="btn-del" data-index="${i}" title="Remove">✕</button>
        `
        container.appendChild(div)
      })

      // Wire row-level events via delegation
      container.addEventListener('input', onRowInput)
      container.addEventListener('click', onRowClick)
    }

    function onRowInput(e) {
      const el = e.target
      const i = parseInt(el.dataset.index)
      if (isNaN(i)) return

      if (el.dataset.field === 'category') rows[i].category = el.value
      if (el.dataset.field === 'notes') rows[i].notes = el.value
      if (el.dataset.field === 'percent') {
        rows[i].allocated_percent = parseFloat(el.value) || 0
        recalculate()
      }
    }

    function onRowClick(e) {
      const btn = e.target.closest('.btn-del')
      if (!btn) return
      const i = parseInt(btn.dataset.index)
      rows.splice(i, 1)
      renderRows()
      recalculate()
    }

    // ─── INCOME CHANGE ────────────────────────────────────────────
    function onIncomeChange(e) {
      const income = parseFloat(e.target.value) || 0
      if (income) localStorage.setItem(`income_${user.id}`, income)
      recalculate()
      // Update amount displays without full re-render
      rows.forEach((row, i) => {
        const el = document.getElementById(`amount-${i}`)
        if (el) {
          const amt = income * (row.allocated_percent / 100)
          el.textContent = income ? '£' + formatNum(amt) : '—'
        }
      })
    }

    // ─── RECALCULATE BAR ──────────────────────────────────────────
    function recalculate() {
      const total = rows.reduce((s, r) => s + (parseFloat(r.allocated_percent) || 0), 0)
      const pct = Math.min(total, 100)

      document.getElementById('allocated-pct').textContent = total.toFixed(1) + '%'
      document.getElementById('remaining-label').textContent = total > 100
        ? `⚠️ Over by ${(total - 100).toFixed(1)}%`
        : `Remaining: ${(100 - total).toFixed(1)}%`

      const fill = document.getElementById('bar-fill')
      fill.style.width = pct + '%'
      fill.className = 'bar-fill' + (total > 100 ? ' over' : '')
    }

    // ─── ADD ROW ──────────────────────────────────────────────────
    function addRow() {
      rows.push({ category: '', allocated_percent: 0, notes: '', user_id: user.id })
      renderRows()
      recalculate()
      // Focus the new category input
      const inputs = document.querySelectorAll('[data-field="category"]')
      inputs[inputs.length - 1]?.focus()
    }

    // ─── SAVE ─────────────────────────────────────────────────────
    async function save() {
      const btn = document.getElementById('save-btn')
      const savedMsg = document.getElementById('saved-msg')
      const errorMsg = document.getElementById('error-msg')
      const income = parseFloat(document.getElementById('income').value) || 0

      btn.disabled = true
      btn.textContent = 'Saving...'
      savedMsg.style.display = 'none'
      errorMsg.style.display = 'none'

      // Delete all existing rows for this user, then re-insert
      const { error: delError } = await supabase
        .from('ideal_allocations')
        .delete()
        .eq('user_id', user.id)

      if (delError) {
        showError(btn, errorMsg, delError.message)
        return
      }

      const toInsert = rows
        .filter(r => r.category.trim() !== '')
        .map(r => ({
          user_id: user.id,
          category: r.category.trim(),
          allocated_percent: parseFloat(r.allocated_percent) || 0,
          allocated_amount: income
            ? parseFloat((income * (r.allocated_percent / 100)).toFixed(2))
            : null,
          notes: r.notes?.trim() || ''
        }))

      const { error: insError } = await supabase
        .from('ideal_allocations')
        .insert(toInsert)

      btn.disabled = false
      btn.textContent = 'Save Allocations'

      if (insError) {
        showError(btn, errorMsg, insError.message)
      } else {
        savedMsg.style.display = 'inline'
        setTimeout(() => savedMsg.style.display = 'none', 3000)
      }
    }

    function showError(btn, el, msg) {
      btn.disabled = false
      btn.textContent = 'Save Allocations'
      el.textContent = '✕ ' + msg
      el.style.display = 'inline'
    }

    // ─── HELPERS ─────────────────────────────────────────────────
    function formatNum(n) {
      return n.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 })
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
    }

    // ─── START ───────────────────────────────────────────────────
    init()
  </script>
</body>
</html>
